<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#06080f"/>
      <stop offset="100%" stop-color="#0c1221"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#162040"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5"/>

  <!-- decorative bus diagram in background -->
  <g opacity="0.3">
    <line x1="180" y1="180" x2="500" y2="120" stroke="#2563eb" stroke-width="2"/>
    <line x1="500" y1="120" x2="850" y2="200" stroke="#2563eb" stroke-width="2"/>
    <line x1="180" y1="180" x2="200" y2="450" stroke="#2563eb" stroke-width="2"/>
    <line x1="850" y1="200" x2="900" y2="500" stroke="#2563eb" stroke-width="2"/>
    <line x1="500" y1="120" x2="450" y2="500" stroke="#2563eb" stroke-width="2"/>
    <line x1="200" y1="450" x2="450" y2="500" stroke="#2563eb" stroke-width="2"/>
    <line x1="450" y1="500" x2="900" y2="500" stroke="#2563eb" stroke-width="2"/>
    <circle cx="180" cy="180" r="14" fill="#0c1221" stroke="#2563eb" stroke-width="2"/>
    <circle cx="500" cy="120" r="14" fill="#0c1221" stroke="#2563eb" stroke-width="2"/>
    <circle cx="850" cy="200" r="14" fill="#0c1221" stroke="#2563eb" stroke-width="2"/>
    <circle cx="200" cy="450" r="14" fill="#0c1221" stroke="#2563eb" stroke-width="2"/>
    <circle cx="450" cy="500" r="14" fill="#0c1221" stroke="#2563eb" stroke-width="2"/>
    <circle cx="900" cy="500" r="14" fill="#0c1221" stroke="#2563eb" stroke-width="2"/>
  </g>

  <!-- battery icon -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="96" height="64" rx="8" fill="none" stroke="url(#accent)" stroke-width="4"/>
    <rect x="96" y="20" width="12" height="24" rx="2" fill="url(#accent)"/>
    <rect x="10" y="10" width="20" height="44" fill="url(#accent)"/>
    <rect x="36" y="10" width="20" height="44" fill="url(#accent)" opacity="0.6"/>
    <rect x="62" y="10" width="14" height="44" fill="url(#accent)" opacity="0.3"/>
  </g>

  <text x="80" y="290" font-family="IBM Plex Sans, sans-serif" font-weight="600" font-size="28" fill="#2563eb" letter-spacing="2">
    IE 590 · PURDUE INDUSTRIAL ENGINEERING
  </text>
  <text x="80" y="380" font-family="IBM Plex Sans, sans-serif" font-weight="700" font-size="92" fill="#f1f5f9">
    Battery Market Maker
  </text>
  <text x="80" y="450" font-family="IBM Plex Sans, sans-serif" font-weight="400" font-size="32" fill="#64748b">
    Multi-period DC-OPF · IEEE 5/14/30-bus · Real PJM data
  </text>

  <text x="80" y="560" font-family="IBM Plex Mono, monospace" font-size="22" fill="#10b981">
    ▸ batteries · AI campuses · renewables · live LMPs
  </text>
</svg>
